<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/cad_veiculo.js" defer></script>
    <title>Gestão de Veículos</title>
</head>
<body>
    <header>
        <nav>
            <a href="../index.html">Principal</a>
            <a href="./cad_veiculo.html">Cadastrar Veículo</a>
            <a href="./list_veiculo.html">Listar Veículos</a>
        </nav>
    </header>
    <main>
        <form>
            <h1>Cadastrar Veículos</h1>
            
            <label for="nome">Nome do Veículo</label><br>
            <input type="text" id="nome"><br><br>
    
            <label for="marca">Marca</label><br>
            <input type="text" id="marca"><br><br>
    
            <label for="categoria">Categoria</label><br>
            <select id="categoria">
                <option value="popular">Popular</option>
                <option value="sedan">Sedan</option>
                <option value="luxo">Luxo</option>
            </select><br><br>
    
            <label for="ano">Ano</label><br>
            <input type="number" id="ano"><br><br>

            <label for="precoFabrica">Preço de Fábrica</label><br>
            <input type="number" step="0.01" id="precoFabrica"><br><br>

            <button id="btn_cad_veiculo">Cadastrar</button>

            <div id="resposta"></div>
        </form>
    </main>
</body>
</html>
